  ai:               { <<: *domain, url: "https://raw.githubusercontent.com/ResonaAlbert/rule/refs/heads/main/Clash/Ruleset/AiDomain.list"}
  cn_domain:        { <<: *domain, url: "https://raw.githubusercontent.com/ResonaAlbert/rule/refs/heads/main/Clash/DirectMode.list"}

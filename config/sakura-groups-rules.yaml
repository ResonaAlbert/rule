# ── 规则匹配（顺序敏感，首次命中即停止）─────────────────────
rules:

  # AI 服务
  - RULE-SET,ai,🤖 AI,no-resolve

  # Apple
  - RULE-SET,apple_domain,🍎 Apple

  # Google / YouTube
  - RULE-SET,youtube_domain,🍀 Google
  - RULE-SET,google_domain,🍀 Google
  - RULE-SET,google_ip,🍀 Google,no-resolve

  # Microsoft / OneDrive
  - RULE-SET,onedrive_domain,🪟 Microsoft
  - RULE-SET,microsoft_domain,🪟 Microsoft

  # Trading & 私有 JP
  - RULE-SET,proxylite,💴 Trading
  - RULE-SET,proxyliteJP,🇯🇵 Private

  # EH（硬编码域名）
  - DOMAIN-SUFFIX,e-hentai.org,🚀 EH
  - DOMAIN-SUFFIX,exhentai.org,🚀 EH

  # 其他服务
  - RULE-SET,speedtest_domain,✈️ Speedtest
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,paypal_domain,💶 PayPal

  # 代理（Netflix / GFW / 非CN）
  - RULE-SET,netflix_domain,🚀 default
  - RULE-SET,gfw_domain,🚀 default
  - RULE-SET,geolocation-!cn,🚀 default

  # Telegram IP
  - RULE-SET,telegram_ip,📲 Telegram,no-resolve

  # 直连（国内域名 / IP / 局域网 / 白名单 / 国内媒体）
  - RULE-SET,cn_domain,🎯 Direct
  - RULE-SET,cn_ip,🎯 Direct
  - RULE-SET,LocalAreaNetwork,🎯 Direct
  - RULE-SET,UnBan,🎯 Direct
  - RULE-SET,Bilibili,🎯 Direct
  - RULE-SET,BilibiliHMT,🎯 Direct
  - RULE-SET,ChinaMedia,🎯 Direct
  - RULE-SET,ChinaDomain,🎯 Direct
  - RULE-SET,ChinaCompanyIp,🎯 Direct

  # 开发者工具 / 下载
  - RULE-SET,Developer,👨🏿‍💻 Download
  - RULE-SET,Download,👨🏿‍💻 Download
  - IP-CIDR,0.0.0.0/0,👨🏿‍💻 Download,no-resolve
  - IP-CIDR6,::/0,👨🏿‍💻 Download,no-resolve

  # 兜底
  - MATCH,🐟 fish

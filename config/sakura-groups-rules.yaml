# ============================================================
# sakura-groups-rules.yaml  ·  策略组 + 规则集声明 + 规则匹配
# 托管于: https://github.com/YOUR_NAME/YOUR_REPO/raw/main/config/sakura-groups-rules.yaml
# 通过主配置的 config-providers 自动合并，每 24h 更新
# 修改后直接 push，无需动 sakura-main.yaml
# ============================================================

# ── YAML 锚点（rule-providers 内部复用）──────────────────────
rule-anchor:
  ip:     &ip     {type: http, interval: 86400, behavior: ipcidr,    format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain,    format: mrs}
  class:  &class  {type: http, interval: 86400, behavior: classical, format: text}

# ── 策略组 ───────────────────────────────────────────────────
proxy-groups:

  # 手动选择组
  - {name: 🚀 default,   type: select, proxies: [🇰🇷🇯🇵🇹🇼 MultiAuto, 🇯🇵🔯 JP_Fallback, 🇸🇬🔯 SG_Fallback, 🇭🇰🔯 HK_Fallback, 🇺🇲🔯 USA_Fallback, 🌐 alpha, DirectMode]}
  - {name: 🐟 fish,      type: select, proxies: [🇰🇷🇯🇵🇹🇼 MultiAuto, 🇯🇵🔯 JP_Fallback, 🇸🇬🔯 SG_Fallback, 🇭🇰🔯 HK_Fallback, 🇺🇲🔯 USA_Fallback, 🌐 alpha, DirectMode]}
  - {name: 🎯 Direct,    type: select, proxies: [DirectMode, 🚀 default]}
  - {name: 🤖 AI,        type: select, proxies: [🇰🇷🇯🇵🇹🇼 MultiAuto, 🇯🇵🔯 JP_Fallback, 🇸🇬🔯 SG_Fallback, 🇭🇰🔯 HK_Fallback, 🇺🇲🔯 USA_Fallback, 🌐 alpha, DirectMode]}
  - {name: 🍀 Google,    type: select, proxies: [🇰🇷🇯🇵🇹🇼 MultiAuto, 🇯🇵🔯 JP_Fallback, 🇸🇬🔯 SG_Fallback, 🇭🇰🔯 HK_Fallback, 🇺🇲🔯 USA_Fallback, 🌐 alpha, DirectMode]}
  - {name: 🍎 Apple,     type: select, proxies: [🇰🇷🇯🇵🇹🇼 MultiAuto, 🇯🇵🔯 JP_Fallback, 🇸🇬🔯 SG_Fallback, 🇭🇰🔯 HK_Fallback, 🇺🇲🔯 USA_Fallback, 🌐 alpha, DirectMode]}
  - {name: 🪟 Microsoft, type: select, proxies: [🇰🇷🇯🇵🇹🇼 MultiAuto, 🇯🇵🔯 JP_Fallback, 🇸🇬🔯 SG_Fallback, 🇭🇰🔯 HK_Fallback, 🇺🇲🔯 USA_Fallback, 🌐 alpha, DirectMode]}
  - {name: 📲 Telegram,  type: select, proxies: [🇰🇷🇯🇵🇹🇼 MultiAuto, 🇯🇵🔯 JP_Fallback, 🇸🇬🔯 SG_Fallback, 🇭🇰🔯 HK_Fallback, 🇺🇲🔯 USA_Fallback, 🌐 alpha, DirectMode]}
  - {name: ✈️ Speedtest, type: select, proxies: [🇰🇷🇯🇵🇹🇼 MultiAuto, 🇯🇵🔯 JP_Fallback, 🇸🇬🔯 SG_Fallback, 🇭🇰🔯 HK_Fallback, 🇺🇲🔯 USA_Fallback, 🌐 alpha, DirectMode]}
  - {name: 💶 PayPal,    type: select, proxies: [🇰🇷🇯🇵🇹🇼 MultiAuto, 🇯🇵🔯 JP_Fallback, 🇸🇬🔯 SG_Fallback, 🇭🇰🔯 HK_Fallback, 🇺🇲🔯 USA_Fallback, 🌐 alpha, DirectMode]}
  - {name: 💴 Trading,   type: select, proxies: [🇰🇷🇯🇵🇹🇼 MultiAuto, 🇯🇵🔯 JP_Fallback, 🇸🇬🔯 SG_Fallback, 🇭🇰🔯 HK_Fallback, 🇺🇲🔯 USA_Fallback, 🌐 alpha, DirectMode]}
  - {name: 🇯🇵 Private,  type: select, proxies: [🇯🇵🔯 JP_Fallback, 🇸🇬🔯 SG_Fallback, 🇭🇰🔯 HK_Fallback, 🇺🇲🔯 USA_Fallback, 🇰🇷🇯🇵🇹🇼 MultiAuto, 🌐 alpha, DirectMode]}
  - {name: 👨🏿‍💻 Download, type: select, include-all: true}
  - {name: 🚀 EH,        type: select, include-all: true}

  # 自动测速组（fallback）
  - {name: 🇭🇰🔯 HK_Fallback,  type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: 🇯🇵🔯 JP_Fallback,  type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  - {name: 🇸🇬🔯 SG_Fallback,  type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(新加坡|坡|SG_|SG|Singapore))^((?!(台|日|韩|深|美)).)*$"}
  - {name: 🇺🇲🔯 USA_Fallback, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$"}

  # 自动测速组（url-test）
  - {name: 🇭🇰♻️ HK_Auto,      type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: 🇯🇵♻️ JP_Auto,      type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  - {name: 🇸🇬♻️ SG_Auto,      type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(新加坡|坡|SG_|SG|Singapore))^((?!(港|台|韩|日|美)).)*$"}
  - {name: 🇺🇲♻️ USA_Auto,     type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"}
  - {name: 🇰🇷🇯🇵🇹🇼 MultiAuto, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(韩|KR|Korea|日|JP|Japan|台|TW|Taiwan))^((?!(港|新|美|深)).)*$"}
  - {name: ♻️ AUTO,             type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "^((?!(DirectMode)).)*$"}

  # 全节点选择
  - {name: 🌐 ALL,   type: select, include-all: true}
  - {name: 🌐 alpha, type: select, include-all: true}
  - {name: 🌐 beta,  type: select, include-all: true}

